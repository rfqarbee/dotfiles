style = "compact"
inline_height = 20

# history_filter = [
#   "^secret-cmd",
#   "^innocuous-cmd .*--secret=.+",
# ]
# cwd_filter = [
#   "^/very/secret/area",
# ]
enter_accept = false
keymap_mode = "vim-insert"

[dotfiles]
enabled = true

[stats]
ignored_commands = [
  "cd",
  "ls",
  "vi",
  "nvim",
  "vim",
  "l",
  "la",
  "lt"
]

[sync]
records = true

[daemon]
enabled = false
autostart = false

[logs]
dir = "~/.local/state/atuin/logs"
