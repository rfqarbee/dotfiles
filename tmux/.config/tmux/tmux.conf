set -g @continuum-restore 'on'
# set -ga terminal-overrides ",xterm*:Tc"
# set-option -g terminal-overrides ",xterm-256color:RGB"
# set-option -g default-terminal 'screen-256color'
set -g status-right-length 200
set -g mouse on

#remap window index at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g mode-keys vi

#remap
unbind C-b
unbind s
unbind i
unbind n
unbind p
unbind c
set-option -g prefix C-space
bind-key C-space send-prefix

# remap binds
bind -n M-O choose-session
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-t new-window
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

#set inactive/active window styles
set -g pane-active-border-style "fg=colour244"
set -g pane-border-style "fg=magenta"
set -g escape-time 0
#open panes in same dir
bind -n M-+ split-window -h -c "#{pane_current_path}"
bind -n M-_ split-window -v -c "#{pane_current_path}"

# personal plugins/binds
bind r source-file ~/dotfiles/tmux/.config/tmux/tmux.conf
# scripts
# bind i run-shell "tmux neww ~/.local/scripts/test.sh"
bind -n M-M run-shell "tmux neww ~/.local/scripts/man-with-fzf.sh" # using fzf-tab now
bind -n M-N run-shell "tmux neww ~/.local/scripts/create-tmux-session" #
bind -n M-L run-shell 'tmux neww sh -c "cd \$(tmux display-message -p \"#{pane_current_path}\") && lazygit"'
bind -n M-O run-shell "$XDG_CONFIG_HOME/tmux/plugins/tmux-sessionx/scripts/sessionx.sh"


#Plugins tmux
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# sessionx rebind
# set -g @sessionx-bind 'Alt-o'
set -g @sessionx-bind-kill-session 'ctrl-d'
set -g @sessionx-filter-current 'false'
set -g @sessionx-layout 'reverse'
set -g @sessionx-bind-select-up 'ctrl-p'
set -g @sessionx-bind-abort 'alt-o'
set -g @sessionx-bind-select-down 'ctrl-n'
set -g @sessionx-bind-scroll-up 'ctrl-k'
set -g @sessionx-bind-scroll-down 'ctrl-j'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-location '20%'

# theme
# set -g @catppuccin_window_left_separator "█"
# set -g @catppuccin_window_right_separator "█"
# set -g @catppuccin_window_number_position "right"
# set -g @catppuccin_window_middle_separator " █"
# set -g @catppuccin_window_default_fill "number"
# set -g @catppuccin_window_current_fill "number"

# set -g @catppuccin_window_right_separator "█"
# set -g @catppuccin_window_number_position "right"
# set -g @catppuccin_window_middle_separator " | "
# set -g @catppuccin_window_default_fill "none"
# set -g @catppuccin_window_current_fill "all"

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"

# set -g @catppuccin_status_left_separator  " "
# set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
# set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "
# set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_connect_separator "yes"

set -g @catppuccin_window_current_text "#{b:pane_current_path}"
set -g @catppuccin_status_modules_right "session cpu date_time"
set -g @catppuccin_date_time_text "%H:%M %d-%m"

run '$XDG_CONFIG_HOME/tmux/plugins/tpm'
#run '~/.tmux/plugins/tpm/tpm' -> if is in home
