# monitor
monitor=DP-1,1920x1080@240,0x0,1
monitor=DP-2,1920x1080@144,1920x0,1

# Execute your favorite apps at launch
exec-once = hyprpaper & waybar & dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-paste --type text --watch cliphist store

# preload wallpaper
$w11 = hyprctl hyprpaper wallpaper "DP-1,~/Media/Pictures/wallpaper/animebeach.jpg"
$w12 = hyprctl hyprpaper wallpaper "DP-2,~/Media/Pictures/wallpaper/animebeach.jpg"
$w21 = hyprctl hyprpaper wallpaper "DP-1,~/Media/Pictures/wallpaper/animegirlstairs.jpg"
$w22 = hyprctl hyprpaper wallpaper "DP-2,~/Media/Pictures/wallpaper/animegirlstairs.jpg"
$w31 = hyprctl hyprpaper wallpaper "DP-1,~/Media/Pictures/wallpaper/Yae-Ei.jpg"
$w32 = hyprctl hyprpaper wallpaper "DP-2,~/Media/Pictures/wallpaper/Yae-Ei.jpg"
$w41 = hyprctl hyprpaper wallpaper "DP-1,~/Media/Pictures/wallpaper/countrygirl.jpg"
$w42 = hyprctl hyprpaper wallpaper "DP-2,~/Media/Pictures/wallpaper/countrygirl.jpg"
$w51 = hyprctl hyprpaper wallpaper "DP-1,~/Media/Pictures/wallpaper/starrynight.jpg"
$w52 = hyprctl hyprpaper wallpaper "DP-2,~/Media/Pictures/wallpaper/starrynight.jpg"
$w61 = hyprctl hyprpaper wallpaper "DP-1,~/Media/Pictures/wallpaper/frieren-fern.jpg"
$w62 = hyprctl hyprpaper wallpaper "DP-2,~/Media/Pictures/wallpaper/frieren-fern.jpg"

# keybinds conf
$terminal = kitty
$fileManager = nemo
$menu = rofi -show drun
$cliphist = cliphist list | rofi -dmenu | cliphist decode | wl-copy
$browser = firefox
$wbreload = killall waybar ; waybar

# bind leader key to window key
$super = SUPER

# Source
source = ~/.config/hypr/env.conf # load this first
source = ~/.config/hypr/hyprconfig.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/hyprkeymap.conf
