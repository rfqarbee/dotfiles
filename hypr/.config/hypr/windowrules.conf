windowrulev2 = suppressevent maximize, class:.*

#for xwaylandvideobridge
windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$
#for xwaylandvideobridge

# default applications on launch
windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 2, class:^(Alacritty)$
windowrulev2 = animation popin, class:^(kitty)$
windowrulev2 = workspace 5, class:^(vesktop)$
windowrulev2 = workspace 4 silent, class:^(steam)$
windowrulev2 = workspace special:notes, class:^(obsidian)$
windowrulev2 = workspace special:browser, class:^(firefox)$
windowrulev2 = float, class:^(steam)$, title:^(Friends List)$

# steam_app_\d

# win 9 for settings, this is ugly, find a workaround
windowrulev2 = workspace 9, class:^(nemo)$
windowrulev2 = workspace 9, class:^(blueman-manager)$
windowrulev2 = workspace 9, class:^(pavucontrol)$


